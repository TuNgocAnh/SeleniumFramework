# Credentials store
# Format: <alias>.user / <alias>.pass
# Password có thể là plaintext (dev), "b64:..." (obfuscation), hoặc "enc:..." (AES, cần env CRED_KEY).
# Sinh chuỗi enc: java -cp target/classes com.selenium.framework.utils.CryptoUtils encrypt <plain>

standard.user=standard_user
standard.pass=b64:c2VjcmV0X3NhdWNl

locked.user=locked_out_user
locked.pass=b64:c2VjcmV0X3NhdWNl
