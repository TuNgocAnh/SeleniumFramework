# Local Selenium Grid for cross-browser parallel execution.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   mvn test "-DgridUrl=http://localhost:4444/wd/hub"
#   docker compose -f docker/docker-compose.yml down
#
# Scale a browser node on demand:
#   docker compose -f docker/docker-compose.yml up -d --scale chrome=3

services:
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4442:4442"   # Event bus publish
      - "4443:4443"   # Event bus subscribe
      - "4444:4444"   # Grid console (open http://localhost:4444)
    environment:
      - GRID_MAX_SESSION=8
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300

  chrome:
    image: selenium/node-chrome:4.27.0
    shm_size: 2g
    depends_on: [selenium-hub]
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
    deploy:
      replicas: 1

  firefox:
    image: selenium/node-firefox:4.27.0
    shm_size: 2g
    depends_on: [selenium-hub]
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
