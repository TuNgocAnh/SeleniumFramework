name: Selenium CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite file'
        default: 'testng-smoke.xml'
        type: choice
        options:
          - testng.xml
          - testng-smoke.xml
          - testng-parallel.xml
      env:
        description: 'Target env'
        default: 'stg'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run tests (headless)
        env:
          CRED_KEY: ${{ secrets.CRED_KEY }}
        run: |
          mvn -B test \
            -Dheadless=true \
            -Dbrowser=chrome \
            -Denv=${{ github.event.inputs.env || 'stg' }} \
            -Dsurefire.suiteXmlFile=${{ github.event.inputs.suite || 'testng-smoke.xml' }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 7

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: reports/
          retention-days: 7

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7
